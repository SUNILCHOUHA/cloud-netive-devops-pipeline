name: Bootstrap ArgoCD 

on:
  workflow_dispatch:

jobs:
  argocd:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::364478544576:role/100DaysOfDevOps
          aws-region: ap-south-1

      - name: Login to EKS Cluster
        run: aws eks update-kubeconfig --region ap-south-1 --name gitops-eks-cluster

      - name: Verify ArgoCD
        run: kubectl get pods -n argocd 

      - name: Wait for ArgoCD
        run: |
          kubectl wait --for=condition=available deployment/argocd-server -n argocd --timeout=120s
      
      - name: Deploy app manifest
        working-directory: argocd 
        run: kubectl apply -f application.yaml

      - name: Verify Monitoring 
        run: kubectl get pods -n monitoring

      - name: Wait for Monitoring
        run: |
          kubectl wait --for=condition=available deployment/prometheus-grafana -n monitoring --timeout=120s

      - name: Apply  Monitoring Rules
        working-directory: argocd
        run: kubectl apply -f monitoring-app.yaml
